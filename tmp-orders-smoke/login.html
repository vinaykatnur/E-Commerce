


<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Login | ElectroMart India</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/css/app.css" rel="stylesheet">
</head>
<body class="auth-shell">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="auth-card shadow-lg">
                <h2 class="fw-bold mb-2">Welcome back</h2>
                <p class="text-secondary mb-4">Sign in to manage your cart, orders, and Razorpay checkout.</p>
                
    <div class="alert alert-success alert-dismissible fade show shadow-sm" role="alert">
        Account created successfully. Please sign in.
        <button type="button" class="btn-close" data-bs-dismiss="alert" aria-label="Close"></button>
    </div>



                <form id="loginRequest" class="vstack gap-3" action="/login" method="post" accept-charset="UTF-8">
                    <input type="hidden" name="" value="">
                    <div>
                        <label class="form-label">Email</label>
                        <input id="email" name="email" class="form-control form-control-lg" type="email" value=""/>
                        
                    </div>
                    <div>
                        <label class="form-label">Password</label>
                        <input id="password" name="password" class="form-control form-control-lg" type="password" value=""/>
                        
                    </div>
                    <button class="btn btn-dark btn-lg w-100" type="submit">Login</button>
                </form>
                <p class="mb-0 mt-4 text-secondary">New here? <a href="/register">Create your account</a></p>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
