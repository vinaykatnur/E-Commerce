

<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Create Account | ElectroMart India</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="/assets/css/app.css" rel="stylesheet">
</head>
<body class="auth-shell">
<div class="container py-5">
    <div class="row justify-content-center">
        <div class="col-lg-5">
            <div class="auth-card shadow-lg">
                <h2 class="fw-bold mb-2">Create your ElectroMart account</h2>
                <p class="text-secondary mb-4">Start shopping premium electronics in INR.</p>
                



                <form id="registerRequest" class="vstack gap-3" action="/register" method="post" accept-charset="UTF-8">
                    <input type="hidden" name="" value="">
                    <div>
                        <label class="form-label">Full Name</label>
                        <input id="fullName" name="fullName" class="form-control form-control-lg" type="text" value=""/>
                        
                    </div>
                    <div>
                        <label class="form-label">Email</label>
                        <input id="email" name="email" class="form-control form-control-lg" type="email" value=""/>
                        
                    </div>
                    <div>
                        <label class="form-label">Password</label>
                        <input id="password" name="password" class="form-control form-control-lg" type="password" value=""/>
                        
                    </div>
                    <button class="btn btn-warning btn-lg w-100" type="submit">Create Account</button>
                </form>
                <p class="mb-0 mt-4 text-secondary">Already registered? <a href="/login">Sign in</a></p>
            </div>
        </div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
