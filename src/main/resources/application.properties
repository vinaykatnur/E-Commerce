spring.application.name=ElectroMart India
server.port=8080

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:electromart_india}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia/Kolkata
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:Vinay@777}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

spring.mvc.view.prefix=/WEB-INF/jsp/
spring.mvc.view.suffix=.jsp

server.servlet.session.cookie.http-only=true
server.servlet.session.cookie.secure=false

app.jwt.secret=${JWT_SECRET:ElectroMartIndiaJwtSecretKeyForSecureSigning1234567890}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.jwt.cookie-name=EM_AUTH

app.razorpay.key-id=${RAZORPAY_KEY_ID:}
app.razorpay.key-secret=${RAZORPAY_KEY_SECRET:}
app.razorpay.currency=INR
app.razorpay.enabled=${RAZORPAY_ENABLED:true}
app.google.maps.api-key=${GOOGLE_MAPS_API_KEY:}

spring.web.resources.static-locations=classpath:/static/,file:src/main/webapp/
server.error.whitelabel.enabled=false

logging.level.org.springframework.security=INFO
